name: PR Quality Check

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

permissions:
  contents: read

jobs:
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: |
          dotnet restore dot-net-core-rest-api.csproj
          dotnet restore Tests/dot-net-core-rest-api.Tests.csproj

      - name: Check code formatting
        run: dotnet format dot-net-core-rest-api.csproj --verify-no-changes --verbosity diagnostic

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: |
          dotnet restore dot-net-core-rest-api.csproj
          dotnet restore Tests/dot-net-core-rest-api.Tests.csproj

      - name: Build
        run: |
          dotnet build dot-net-core-rest-api.csproj --no-restore --configuration Release
          dotnet build Tests/dot-net-core-rest-api.Tests.csproj --no-restore --configuration Release

      - name: Run tests with coverage
        run: >
          dotnet test Tests/dot-net-core-rest-api.Tests.csproj
          --no-build
          --configuration Release
          --verbosity normal
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput=../coverage/coverage.cobertura.xml
          /p:ThresholdType=line
          /p:Threshold=95
